name: EcgAfib
description: "Frontend for ai analysis of an ecg"
publish_to: 'none'
version: 1.0.1

environment:
  sdk: ^3.10.8

dependencies:
  flutter:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4
  permission_handler: ^12.0.1
  universal_ble: ^1.2.0
  mobile_scanner: ^7.2.0
  http: ^1.6.0
  flutter_dotenv: ^6.0.0
  shake: ^3.0.0
  fl_chart: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
    - assets/heart.png
flutter_icons:
  android: "launcher_icon"
  image_path: "assets/heart.png"